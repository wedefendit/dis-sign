# dis-sign.conf — per-project signing manifest config.
# Parsed by dis-sign as a constrained config file. Supported keys are
# APP_NAME, SIGNING_KEY, CATEGORIES, and IGNORE.
# Copy to your project root and edit.

APP_NAME=dis-sign
SIGNING_KEY=2C4259D83B8EC4BBBA6CDCF067528B17E4558404

# GPG_HOME is optional. Use it to pin a per-project GPG homedir so you
# don't have to re-export DIS_SIGN_GPG_HOME every shell. `~` expands to
# $HOME. Env DIS_SIGN_GPG_HOME still wins if set.
#
# GPG_HOME=~/.gnupg-wedefendit-public

# CATEGORIES controls which files end up in the manifest and how
# they're grouped. Format: "category-name:glob [glob ...]"
#
# If CATEGORIES is set, only files matching the globs are included.
# Useful when you want to verify subsets independently (e.g. just
# the scripts, just the configs).
#
# If CATEGORIES is commented out or empty, dis-sign falls back to
# `git ls-files` and includes every tracked file under a single
# "all" category. Zero maintenance — add a file to git and it's
# automatically in the manifest.
#
# This repo uses explicit categories as an example:
CATEGORIES=(
  "bin:bin/*"
  "docs:docs/*"
  "examples:examples/*"
  "test:test/*"
  "assets:assets/*"
  "root:README.md LICENSE .gitignore dis-sign.conf"
)

# To use git auto-tracking instead, comment out CATEGORIES above:
# CATEGORIES=()

# IGNORE is an optional array of bash globs applied after file selection
# in both modes. Any file matching any IGNORE glob is dropped before
# hashing. Useful for excluding test fixtures, vendored subtrees, or
# generated output from the manifest.
#
# Globs are native bash path globs with `globstar` on — `**` matches
# across directories, `*` does not. Matches are against repo-relative
# paths and must not point outside the repo.
#
# IGNORE=(
#   "test/playwright/**"
#   "**/*.snapshot"
#   "vendor/**"
# )
